apply plugin: 'com.android.application'

import groovy.json.JsonSlurper

def baseApplicationId = "com.ajithsuryathati.shifttracker"
def tvApplicationId = "${baseApplicationId}.tv"
def googleServicesFile = file("google-services.json")

def hasFirebaseClientForPackage = { String packageName ->
    if (!googleServicesFile.exists()) {
        return false
    }

    try {
        def parsed = new JsonSlurper().parseText(googleServicesFile.getText("UTF-8"))
        def clients = parsed?.client instanceof List ? parsed.client : []
        return clients.any { client ->
            client?.client_info?.android_client_info?.package_name == packageName
        }
    } catch (Exception ignored) {
        return false
    }
}

def hasBaseFirebaseClient = hasFirebaseClientForPackage(baseApplicationId)
def hasTvFirebaseClient = hasFirebaseClientForPackage(tvApplicationId)
def useTvApplicationIdSuffix = hasTvFirebaseClient

if (googleServicesFile.exists()) {
    apply plugin: 'com.google.gms.google-services'
}

if (!googleServicesFile.exists()) {
    logger.lifecycle("google-services.json was not found. Firebase push runtime will be unavailable.")
}

if (googleServicesFile.exists() && !hasBaseFirebaseClient) {
    logger.lifecycle("google-services.json is missing package ${baseApplicationId}. Firebase push runtime will be unavailable.")
}

if (googleServicesFile.exists() && !hasTvFirebaseClient) {
    logger.lifecycle("google-services.json is missing package ${tvApplicationId}. TV flavor will reuse ${baseApplicationId} for Firebase-enabled features.")
}

def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = baseApplicationId
    compileSdk = rootProject.ext.compileSdkVersion
    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }
    defaultConfig {
        applicationId baseApplicationId
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 4
        versionName "1.0.3"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
        }
    }
    flavorDimensions += "formFactor"
    productFlavors {
        mobile {
            dimension "formFactor"
        }
        tv {
            dimension "formFactor"
            if (useTvApplicationIdSuffix) {
                applicationIdSuffix ".tv"
            }
            versionNameSuffix "-tv"
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation platform('com.google.firebase:firebase-bom:34.10.0')
    implementation 'com.google.firebase:firebase-messaging'
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'
